name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm run pw:install
      - name: Check formatting
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Run TypeScript tests
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Build packages
        run: npm run build
      - name: Run internal benchmark
        run: npm run bench:internal
      - name: Run system preflight
        run: npm run preflight
      - name: Audit production dependencies
        run: npm run audit:prod
      - name: Check documentation links
        run: npm run check:docs
      - name: Check release versions
        run: npm run check:release-versions
      - name: Scan for committed secrets
        run: npm run scan:secrets
      - run: PYTHONPATH=benchmarks/agentlab python -m unittest discover -s benchmarks/agentlab/tests
      - run: python packages/game-training/python/test_worker.py
      - run: python -m py_compile benchmarks/agentlab/lhic_semantic_policy.py benchmarks/agentlab/lhic_agent.py benchmarks/agentlab/preflight.py benchmarks/agentlab/run_study.py

  package-smoke:
    name: Package smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run package:smoke
      - run: npm run package:alias-smoke
      - name: Run desktop package
        shell: bash
        env:
          CSC_FOR_PULL_REQUEST: "true"
        run: |
          set -o pipefail
          npm run desktop:package 2>&1 | tee desktop-package.log
      - name: Upload desktop package failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-package-${{ runner.os }}
          path: desktop-package.log

  container-preflight:
    name: Container production preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Generate an ephemeral approval public key
        run: |
          node -e 'const { generateKeyPairSync } = require("node:crypto"); const { writeFileSync } = require("node:fs"); const { publicKey } = generateKeyPairSync("ed25519"); writeFileSync(process.argv[1], publicKey.export({ format: "pem", type: "spki" }), { mode: 0o444 });' "$RUNNER_TEMP/lhic-approval-public.pem"
          echo "LHIC_APPROVAL_PUBLIC_KEY_HOST_FILE=$RUNNER_TEMP/lhic-approval-public.pem" >> "$GITHUB_ENV"
      - name: Build and run the production Compose preflight
        env:
          LHIC_ALLOWED_ORIGINS: https://app.example.com
        run: |
          set -o pipefail
          docker compose -f docker-compose.security.yml build 2>&1 \
            | tee container-preflight.log
          docker compose -f docker-compose.security.yml run --rm \
            trace-storage-init 2>&1 | tee -a container-preflight.log
          docker compose -f docker-compose.security.yml up --no-build --no-deps \
            --abort-on-container-exit --exit-code-from lhic-agent lhic-agent \
            2>&1 | tee -a container-preflight.log
      - name: Upload container preflight failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-preflight
          path: container-preflight.log
      - name: Remove test containers and trace data
        if: always()
        env:
          LHIC_ALLOWED_ORIGINS: https://app.example.com
        run: docker compose -f docker-compose.security.yml down --volumes --remove-orphans
