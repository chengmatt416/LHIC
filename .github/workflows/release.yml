name: Release CLI

on:
  push:
    tags: ["cli-v*.*.*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm run pw:install
      - name: Resolve CLI release version
        id: release-version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: echo "version=${RELEASE_TAG#cli-v}" >> "$GITHUB_OUTPUT"
      - name: Verify CLI release tag and manifest
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: npm run check:cli-release-tag
      - run: npm run ci
      - run: npm run package:smoke
      - run: npm run package:alias-smoke
      - name: Publish scoped CLI with npm trusted publishing
        run: npm publish --workspace @pinyencheng/lhic --access public --provenance
      - name: Publish compatibility entry with npm trusted publishing
        run: npm publish --workspace lhic --access public --provenance
      - name: Wait for the scoped package to become visible
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          for attempt in $(seq 1 24); do
            published_core="$(npm view "@pinyencheng/lhic@$RELEASE_VERSION" version --registry=https://registry.npmjs.org 2>/dev/null || true)"
            published_alias="$(npm view "lhic@$RELEASE_VERSION" version --registry=https://registry.npmjs.org 2>/dev/null || true)"
            if [ "$published_core" = "$RELEASE_VERSION" ] && [ "$published_alias" = "$RELEASE_VERSION" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for the CLI packages at version $RELEASE_VERSION on npm." >&2
          exit 1
      - name: Verify the published scoped package
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
        run: npm run package:published-smoke -- "$RELEASE_VERSION"
      - name: Verify the published compatibility package
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
        run: npm run package:published-alias-smoke -- "$RELEASE_VERSION"
